name: Python ci pipiline
on: 
    push:
        branches:
            -main
    pull_request:
        branches:
            -main
    workflow_dispatch:
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name:checkout respository
              uses:actions/checkout@v4
            - name:setup python
              uses:actions/setup-python@v5
              with:
                python-version:"3.14"
            - name:install dependencies
              run:pip3 install -r requirements.txt
            - name:run test
              run:pytest    



